version: '3.9'

services:
  backend:
    build: ./backend
    container_name: backend_container
    expose:
      - "8080"  # sadece iç network
    networks:
      - app-network

  nginx:
    image: nginx:1.25
    container_name: nginx_container
    ports:
      - "80:80"  # dış dünyaya açık
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network: